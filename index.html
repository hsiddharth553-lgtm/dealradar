<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080d;--surf:#111117;--card:#17171f;--card2:#1e1e28;--bord:#25252f;--bord2:#32323e;
  --acc:#f97316;--ind:#6366f1;--grn:#10b981;--red:#ef4444;--amb:#f59e0b;--blu:#3b82f6;--pur:#8b5cf6;
  --txt:#eeeef5;--txt2:#9898a8;--txt3:#5a5a6e;
  --topbar:54px;--bnav:60px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
h1,h2,h3{font-family:'Syne',sans-serif}
button{font-family:'Inter',sans-serif;cursor:pointer;border:none;background:none;color:inherit}
img{display:block;max-width:100%}
input,select,textarea{font-family:'Inter',sans-serif}
a{text-decoration:none;color:inherit}
#app{display:flex;flex-direction:column;height:100dvh;height:100vh}
/* Topbar */
.topbar{background:var(--surf);border-bottom:1px solid var(--bord);height:var(--topbar);padding:0 12px;display:flex;align-items:center;gap:7px;position:sticky;top:0;z-index:100;flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:-.3px;white-space:nowrap;cursor:pointer}
.logo em{color:var(--acc);font-style:normal}
.live{display:flex;align-items:center;gap:4px;background:#ef444418;border:1px solid #ef444430;border-radius:20px;padding:2px 7px;font-size:10px;color:#ef4444;flex-shrink:0}
.live span{width:5px;height:5px;background:#ef4444;border-radius:50%;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.tsep{flex:1}
.ibtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--bord);color:var(--txt2);display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.ibtn:hover,.ibtn.on{border-color:var(--acc);color:var(--acc)}
.tbhi{background:var(--acc);color:#fff;border-radius:8px;padding:6px 11px;font-size:12px;font-weight:600;font-family:'Syne',sans-serif;white-space:nowrap;flex-shrink:0}
.prem-chip{background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;flex-shrink:0}
.prem-chip.active{background:linear-gradient(135deg,#10b981,#6366f1)}
.dev-badge{background:#6366f120;border:1px solid #6366f140;color:#6366f1;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:600}
/* Layout */
.layout{display:flex;flex:1;min-height:0;overflow:hidden}
.sidebar{width:210px;background:var(--surf);border-right:1px solid var(--bord);padding:10px 6px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;flex-shrink:0}
.slbl{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;padding:10px 10px 4px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;color:var(--txt2);font-size:12px;width:100%;text-align:left;transition:.15s}
.ni:hover{background:var(--card);color:var(--txt)}
.ni.on{background:var(--acc)18;color:var(--acc);font-weight:500}
.nico{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.nbdg{margin-left:auto;background:var(--card2);color:var(--txt3);border-radius:8px;padding:1px 5px;font-size:10px}
.ni.on .nbdg{background:var(--acc)30;color:var(--acc)}
.next-sale{background:var(--card2);border-radius:10px;padding:11px;margin:8px 2px 2px}
.content{flex:1;overflow-y:auto;padding:14px;min-height:0}
/* Search/chips */
.sarea{margin-bottom:14px}
.swrap{position:relative;margin-bottom:8px}
.sico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}
.swrap input{width:100%;background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:9px 12px 9px 36px;color:var(--txt);font-size:13px;outline:none;transition:.15s}
.swrap input:focus{border-color:var(--acc)}
.swrap input::placeholder{color:var(--txt3)}
.chips{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{background:var(--card);border:1px solid var(--bord);color:var(--txt2);border-radius:20px;padding:4px 12px;font-size:11px;white-space:nowrap;transition:.15s;flex-shrink:0}
.chip:hover,.chip.on{background:var(--acc)20;border-color:var(--acc);color:var(--acc)}
/* Grid */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.pc{background:var(--card);border:1px solid var(--bord);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s;-webkit-tap-highlight-color:transparent;animation:fadeUp .2s ease both}
.pc:hover{border-color:var(--ind);transform:translateY(-2px)}
.pc:active{transform:scale(.98)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.pc-img{background:#fff;height:155px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.pc-img img{max-width:130px;max-height:140px;object-fit:contain;transition:transform .2s}
.pc:hover .pc-img img{transform:scale(1.06)}
.imgfb{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:var(--card2)}
.imgfb .fe{font-size:42px}
.imgfb .fn{font-size:9px;color:var(--txt3);text-align:center;padding:0 8px}
.pc-disc{position:absolute;top:8px;left:8px;background:#ef4444;color:#fff;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;font-family:'Syne',sans-serif}
.pc-deal{position:absolute;top:8px;right:8px;background:#10b98122;color:#10b981;border:1px solid #10b98144;border-radius:5px;padding:2px 6px;font-size:9px;font-weight:600}
.pc-new{position:absolute;top:8px;right:8px;background:#6366f122;color:#6366f1;border:1px solid #6366f144;border-radius:5px;padding:2px 6px;font-size:9px;font-weight:600}
.cmp-chk{position:absolute;bottom:6px;left:6px;width:20px;height:20px;border-radius:5px;border:2px solid var(--bord2);background:var(--card2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:.15s;z-index:2}
.cmp-chk.on{border-color:var(--ind);background:var(--ind)}
.pc-body{padding:10px 12px 7px}
.pc-name{font-family:'Syne',sans-serif;font-weight:600;font-size:12px;line-height:1.35;margin-bottom:3px;color:var(--txt)}
.pc-cat{font-size:9px;background:var(--card2);color:var(--txt3);border-radius:4px;padding:2px 6px;display:inline-block;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.btag{display:inline-block;border-radius:4px;padding:2px 6px;font-size:9px;font-weight:600;margin-left:3px}
.btag-g{background:#10b98118;color:#10b981;border:1px solid #10b98130}
.btag-m{background:#3b82f618;color:#3b82f6;border:1px solid #3b82f630}
.btag-h{background:#f9731618;color:#f97316;border:1px solid #f9731630}
.btag-p{background:#8b5cf618;color:#8b5cf6;border:1px solid #8b5cf630}
.prow{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.pb{font-size:9px;font-weight:700;border-radius:4px;padding:2px 5px}
.amz{background:#f9731618;color:#f97316}
.flp{background:#2874f018;color:#2874f0}
.pn{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.mrp{font-size:10px;color:var(--txt3);text-decoration:line-through}
.pc-foot{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-top:1px solid var(--bord)}
.spkwrap{width:72px;height:26px}
.abtn{border:1px solid var(--bord);color:var(--txt2);border-radius:6px;padding:3px 8px;font-size:10px;transition:.15s}
.abtn:hover{border-color:var(--grn);color:var(--grn)}
/* Quick specs row */
.qspecs{display:flex;flex-wrap:wrap;gap:3px;padding:0 12px 8px}
.qs{font-size:9px;background:var(--surf);border:1px solid var(--bord);border-radius:4px;padding:2px 5px;color:var(--txt3)}
/* Compare bar */
.cmpbar{position:fixed;bottom:calc(var(--bnav) + 8px);left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--ind);border-radius:14px;padding:10px 16px;z-index:150;display:none;align-items:center;gap:10px;box-shadow:0 8px 30px #0008;font-size:12px;max-width:92vw}
.cmpbar.show{display:flex}
.cmpbar-names{flex:1;color:var(--txt2);font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cmpbar-go{background:var(--ind);color:#fff;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;font-family:'Syne',sans-serif;flex-shrink:0}
.cmpbar-clr{color:var(--txt3);font-size:11px;flex-shrink:0}
/* Detail panel */
.dp{background:var(--card);border:1px solid var(--bord);border-radius:14px;overflow:hidden;margin-bottom:16px;animation:fadeUp .2s ease both}
.dp-top{display:grid;grid-template-columns:220px 1fr}
.dp-imgside{background:#fff;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;border-right:1px solid var(--bord)}
.dp-imgside img{width:180px;height:180px;object-fit:contain}
.dp-imgside .imgfb{width:180px;height:180px;border-radius:10px}
.dp-info{padding:16px}
.dp-name{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;margin-bottom:3px;line-height:1.3}
.dp-brand{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.dp-prices{display:flex;gap:8px;margin-bottom:12px}
.dp-pb{flex:1;background:var(--surf);border:1px solid var(--bord);border-radius:9px;padding:9px 11px}
.dp-pb.best{border-color:var(--grn)}
.dp-pnm{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.dp-price{font-family:'Syne',sans-serif;font-weight:800;font-size:17px}
.dp-was{font-size:10px;color:var(--txt3);text-decoration:line-through;margin-top:1px}
.dp-off{font-size:10px;color:var(--grn);font-weight:600}
.bt{font-size:9px;background:var(--grn)22;color:var(--grn);border-radius:3px;padding:1px 5px;margin-left:4px}
.dp-cta{display:flex;gap:7px;margin-bottom:11px}
.dp-cta a{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;transition:.15s}
.cta-a{background:var(--acc);color:#fff}
.cta-f{background:#2874f0;color:#fff}
.dp-pred{background:var(--ind)12;border:1px solid var(--ind)30;border-radius:8px;padding:8px 10px;font-size:11px;line-height:1.6;color:var(--txt2);margin-bottom:8px}
.dp-pred strong{color:var(--ind)}
.dp-close{float:right;margin-top:1px;border:1px solid var(--bord);color:var(--txt2);border-radius:7px;padding:4px 10px;font-size:11px;transition:.15s}
.dp-close:hover{border-color:var(--red);color:var(--red)}
/* Specs */
.specs-sec{border-top:1px solid var(--bord);padding:14px 16px}
.spec-ttl{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.stabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.stab{background:var(--surf);border:1px solid var(--bord);border-radius:6px;padding:3px 9px;font-size:11px;color:var(--txt2);transition:.15s;cursor:pointer}
.stab.on{background:var(--ind);border-color:var(--ind);color:#fff}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.srow{display:flex;padding:5px 0;border-bottom:1px solid var(--bord)}
.srow:last-child{border-bottom:none}
.slb{font-size:10px;color:var(--txt3);min-width:110px;flex-shrink:0}
.svl{font-size:10px;color:var(--txt);font-weight:500}
/* Compare view */
.cmp-view{background:var(--card);border:1px solid var(--ind)40;border-radius:14px;padding:16px;margin-bottom:16px;animation:fadeUp .2s ease both}
.cmp-view h2{font-family:'Syne',sans-serif;font-size:15px;margin-bottom:14px;color:var(--ind)}
.cmp-table{overflow-x:auto}
.cmp-table table{width:100%;border-collapse:collapse;font-size:11px}
.cmp-table th{background:var(--surf);padding:8px;text-align:left;font-family:'Syne',sans-serif;font-size:11px;border-bottom:2px solid var(--ind)40}
.cmp-table th:first-child{min-width:120px;color:var(--txt3)}
.cmp-table td{padding:7px 8px;border-bottom:1px solid var(--bord);vertical-align:top}
.cmp-table tr:hover td{background:var(--surf)}
.cmp-table td.best{color:var(--grn);font-weight:600}
.cmp-table .cmp-head{background:#fff;text-align:center;padding:12px 8px}
.cmp-table .cmp-head img{max-width:60px;max-height:60px;object-fit:contain;margin:0 auto 4px}
/* Dev panel */
.dev-panel{background:var(--card);border:1px solid #6366f140;border-radius:14px;padding:16px;margin-bottom:16px}
.dev-panel h2{font-family:'Syne',sans-serif;font-size:15px;margin-bottom:12px;color:var(--ind)}
.dfg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.dff{display:flex;flex-direction:column;gap:4px}
.dff label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
.dff input,.dff select,.dff textarea{background:var(--surf);border:1px solid var(--bord);border-radius:8px;padding:7px 10px;color:var(--txt);font-size:12px;outline:none;transition:.15s;width:100%}
.dff input:focus,.dff select:focus{border-color:var(--ind)}
.dff.fw{grid-column:span 2}
.dab{background:var(--ind);color:#fff;border-radius:8px;padding:8px 18px;font-size:12px;font-weight:600;font-family:'Syne',sans-serif}
.d-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bord)}
.d-item:last-child{border-bottom:none}
.d-del{color:var(--red);font-size:11px;border:1px solid var(--bord);border-radius:5px;padding:2px 8px;transition:.15s}
.d-del:hover{border-color:var(--red)}
.login-box{background:var(--surf);border:1px solid var(--bord);border-radius:12px;padding:20px;max-width:360px;margin:20px auto}
.login-box h3{font-family:'Syne',sans-serif;font-size:15px;margin-bottom:12px;text-align:center}
.dlbtn{width:100%;background:var(--ind);color:#fff;border-radius:8px;padding:10px;font-size:13px;font-weight:600;font-family:'Syne',sans-serif;margin-top:10px}
/* Premium */
.prem-page{max-width:500px;margin:0 auto}
.prem-hero{background:linear-gradient(135deg,#f59e0b18,#f9731618);border:1px solid #f9731630;border-radius:16px;padding:24px;text-align:center;margin-bottom:16px}
.prem-hero h2{font-family:'Syne',sans-serif;font-size:22px;background:linear-gradient(135deg,#f59e0b,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.plan-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.plan-card{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:.2s}
.plan-card:hover,.plan-card.sel{border-color:var(--acc);background:var(--acc)08}
.plan-card.sel{border-width:2px}
.plan-price{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--acc);margin:8px 0 4px}
.plan-save{font-size:10px;font-weight:600;color:var(--grn)}
.prem-feats{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:14px;margin-bottom:14px}
.prem-feats h3{font-family:'Syne',sans-serif;font-size:13px;margin-bottom:10px}
.pf{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;color:var(--txt2)}
.pf span{color:var(--grn);font-size:14px;flex-shrink:0}
.prem-tc{background:var(--surf);border-radius:10px;padding:12px;margin-bottom:14px;font-size:10px;color:var(--txt3);line-height:1.7;max-height:180px;overflow-y:auto}
.prem-tc h4{font-family:'Syne',sans-serif;font-size:11px;color:var(--txt2);margin:8px 0 3px}
.pay-btn{width:100%;background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;border-radius:10px;padding:13px;font-size:14px;font-weight:700;font-family:'Syne',sans-serif;margin-bottom:8px}
.pay-note{font-size:10px;color:var(--txt3);text-align:center}
/* Analyzer */
.analyzer{background:var(--card);border:1px solid var(--amb)30;border-radius:14px;padding:16px;margin-bottom:16px}
.analyzer h2{font-family:'Syne',sans-serif;font-size:14px;margin-bottom:8px;color:var(--amb)}
.anl-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.anl-in{background:var(--surf);border:1px solid var(--bord);border-radius:8px;padding:8px 11px;color:var(--txt);font-size:12px;outline:none;flex:1;min-width:130px}
.anl-in:focus{border-color:var(--amb)}
.anl-btn{background:var(--amb);color:#08080d;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;white-space:nowrap}
.anl-result{background:var(--surf);border-radius:10px;padding:14px;margin-top:8px}
.tier-badge{display:inline-block;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;margin-bottom:8px}
/* Predictions */
.pred-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:14px}
.pred-card{background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:12px;animation:fadeUp .2s ease both}
.chart-panel{background:var(--card);border:1px solid var(--bord);border-radius:14px;padding:14px;margin-bottom:12px}
.ctitle{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;margin-bottom:10px}
/* Alerts */
.ait{background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:11px;display:flex;align-items:center;gap:10px;margin-bottom:8px;animation:fadeUp .2s ease both}
.adel{border:1px solid var(--bord);color:var(--txt3);border-radius:5px;padding:3px 7px;font-size:10px;transition:.15s;flex-shrink:0}
.adel:hover{border-color:var(--red);color:var(--red)}
.empty{text-align:center;padding:40px 20px;color:var(--txt3)}
.empty .ei{font-size:32px;margin-bottom:10px}
/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.mb{position:fixed;bottom:0;left:0;right:0;z-index:201;background:var(--card);border-radius:18px 18px 0 0;border:1px solid var(--bord);border-bottom:none;padding:18px 18px 28px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:88dvh;overflow-y:auto}
.mb.open{transform:translateY(0)}
.mhandle{width:32px;height:4px;background:var(--bord2);border-radius:2px;margin:-6px auto 14px}
.mtitle{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:12px}
.mf{margin-bottom:10px}
.mf label{display:block;font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.mf input,.mf select{width:100%;background:var(--surf);border:1px solid var(--bord);border-radius:8px;padding:9px 11px;color:var(--txt);font-size:12px;outline:none;transition:.15s}
.mf input:focus,.mf select:focus{border-color:var(--acc)}
.mbtns{display:flex;gap:7px;margin-top:12px}
.mbtn{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:600;font-family:'Syne',sans-serif;transition:.15s}
.mbtn.save{background:var(--acc);color:#fff}
.mbtn.cancel{background:var(--surf);border:1px solid var(--bord);color:var(--txt2)}
/* Toast */
.toast{position:fixed;bottom:calc(var(--bnav) + 10px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--grn);color:#fff;border-radius:10px;padding:9px 16px;font-size:12px;font-weight:500;z-index:300;opacity:0;transition:.3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Bottom nav */
.bnav{display:none;background:var(--surf);border-top:1px solid var(--bord);height:var(--bnav);flex-shrink:0;position:sticky;bottom:0;z-index:100}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:9px;color:var(--txt3);transition:.15s;height:var(--bnav)}
.bni.on{color:var(--acc)}
/* Ad banner */
.ad-strip{background:var(--surf);border:1px dashed var(--bord2);border-radius:8px;padding:6px 12px;margin-bottom:12px;text-align:center;font-size:10px;color:var(--txt3);overflow:hidden;min-height:60px;display:flex;align-items:center;justify-content:center}
.ad-strip.hidden{display:none}
/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}.bnav{display:flex}
  .dp-top{grid-template-columns:1fr}
  .dp-imgside{border-right:none;border-bottom:1px solid var(--bord);flex-direction:row;gap:10px;align-items:flex-start;padding:12px}
  .dp-imgside img,.dp-imgside .imgfb{width:90px;height:90px}
  .sgrid{grid-template-columns:1fr}
  .pgrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
  .pc-img{height:130px}.pc-img img{max-width:105px;max-height:115px}
  .content{padding:10px}.dfg{grid-template-columns:1fr}.dff.fw{grid-column:span 1}
  .plan-cards{grid-template-columns:1fr}
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:4px}
</style>

var S={filt:'all',chip:'',tab:'home',openId:null,alerts:[],anl:{budget:'',useCase:'any',result:null}};
var cmpIds=[];

function allP(){return BASE_PRODUCTS.concat(DEV_PRODUCTS);}
var fmt=function(n){return n?'₹'+Math.round(n).toLocaleString('en-IN'):'—';};
var dc=function(m,p){return m&&p?Math.round((m-p)/m*100):0;};
var bp=function(p){return Math.min(p.ap,p.fp);};
var bm=function(p){return Math.max(p.am,p.fm);};

function btag(p){
  var price=bp(p);
  if(p.cat==='gaming'){
    if(price<75000)return '<span class="btag btag-g">Entry Gaming</span>';
    if(price<130000)return '<span class="btag btag-m">Mid Gaming</span>';
    return '<span class="btag btag-h">High-End</span>';
  }
  if(p.cat==='laptop'){
    if(price<50000)return '<span class="btag btag-g">Budget</span>';
    if(price<100000)return '<span class="btag btag-m">Mid-Range</span>';
    return '<span class="btag btag-p">Premium</span>';
  }
  return '';
}

// Quick specs for card display (GPU + RAM + SSD for gaming; RAM + SSD + CPU for laptops)
function qspecsHtml(p){
  var out=[];
  var s=p.specs;
  if(p.cat==='gaming'&&s.Performance){
    if(s.Performance['GPU'])out.push(s.Performance['GPU'].replace('NVIDIA ',''));
    if(s.Performance['RAM'])out.push(s.Performance['RAM']);
    if(s.Performance['SSD'])out.push(s.Performance['SSD']);
    if(s.Performance['CPU'])out.push(s.Performance['CPU'].replace('Intel ','').replace('AMD ',''));
  }else if(p.cat==='laptop'&&s.Performance){
    if(s.Performance['CPU']||s.Performance['Chip'])out.push((s.Performance['CPU']||s.Performance['Chip']).replace('Intel ','').replace('AMD ','').replace('Apple ',''));
    if(s.Performance['RAM'])out.push(s.Performance['RAM']);
    if(s.Performance['SSD'])out.push(s.Performance['SSD']);
  }
  if(!out.length)return '';
  return '<div class="qspecs">'+out.slice(0,3).map(function(v){return '<span class="qs">'+v+'</span>';}).join('')+'</div>';
}

function fl(){
  var q=(document.getElementById('srch')?document.getElementById('srch').value:'').toLowerCase();
  return allP().filter(function(p){
    if(S.filt==='gaming'&&p.cat!=='gaming')return false;
    if(S.filt==='laptop'&&p.cat!=='laptop')return false;
    if(S.filt==='phone'&&p.cat!=='phone')return false;
    if(S.filt==='tablet'&&p.cat!=='tablet')return false;
    if(S.filt==='drops'&&dc(bm(p),bp(p))<10)return false;
    if(S.filt==='budget'&&bp(p)>60000)return false;
    if(S.chip==='deal'&&dc(bm(p),bp(p))<12)return false;
    if(S.chip==='new'&&!p.nx)return false;
    if(S.chip==='gaming'&&p.cat!=='gaming')return false;
    if(S.chip==='budget'&&bp(p)>60000)return false;
    if(S.chip==='premium'&&bp(p)<100000)return false;
    if(q&&!p.name.toLowerCase().includes(q)&&!p.brand.toLowerCase().includes(q)&&!p.cat.includes(q))return false;
    return true;
  });
}

function render(){

  if(S.tab==='analyzer'){r.innerHTML=renderAnalyzer();return;}
  if(S.tab==='premium'){r.innerHTML=renderPremium();return;}
  if(S.tab==='compare'){r.innerHTML=renderCompare();return;}
  var list=fl();
  var html='';
  if(S.openId){var dp=allP().find(function(x){return x.id===S.openId;});if(dp)html+=renderDetail(dp);}
  html+=list.length?'<div class="pgrid">'+list.map(renderCard).join('')+'</div>':
    '<div class="empty"><div class="ei">🔍</div><p>No products match.<br>Try a different filter.</p></div>';
  r.innerHTML=html;
  list.forEach(initSpark);
  updateCmpBar();
}

      datasets:[{data:p.t,borderColor:dn?'#10b981':'#ef4444',borderWidth:1.5,pointRadius:0,fill:true,backgroundColor:dn?'#10b98110':'#ef444410',tension:.4}]},

function toggleCmp(e,id){
  e.stopPropagation();
  var i=cmpIds.indexOf(id);
  if(i>-1){cmpIds.splice(i,1);}
  else{if(cmpIds.length>=4){toast('Max 4 products to compare','warn');return;}cmpIds.push(id);}
  render();
}
function clearCompare(){cmpIds=[];render();}
function updateCmpBar(){
  var bar=document.getElementById('cmpbar');
  var nm=document.getElementById('cmpnames');
  if(!bar||!nm)return;
  if(cmpIds.length>0){
    bar.classList.add('show');
    nm.textContent=cmpIds.map(function(id){var p=allP().find(function(x){return x.id===id;});return p?p.name.split(' ').slice(0,3).join(' '):'';}).join(' vs ');
  }else{bar.classList.remove('show');}
}
function renderCompare(){
  var items=cmpIds.map(function(id){return allP().find(function(x){return x.id===id;});}).filter(Boolean);
  if(items.length<2)return '<div class="cmp-view"><h2>⚖️ Compare Products</h2>'+
    '<div class="empty"><div class="ei">⚖️</div><p>Tick the ✓ checkbox on 2–4 product cards to compare them side by side.</p>'+
    '<button onclick="showTab(\'home\')" style="margin-top:12px;background:var(--ind);color:#fff;border-radius:8px;padding:8px 18px;font-size:12px;font-weight:600">Browse Products</button></div></div>';

  // Gather all spec rows
  var allKeys=['Best Price','MRP','Amazon Price','Flipkart Price','Discount'];
  items.forEach(function(p){Object.keys(p.specs).forEach(function(cat){Object.keys(p.specs[cat]).forEach(function(k){if(allKeys.indexOf(k)<0)allKeys.push(k);});});});

  var html='<div class="cmp-view"><h2>⚖️ Compare: '+items.map(function(p){return p.name.split(' ').slice(0,3).join(' ');}).join(' vs ')+'</h2>'+
    '<button onclick="clearCompare()" style="font-size:11px;color:var(--red);border:1px solid var(--bord);border-radius:6px;padding:4px 11px;margin-bottom:14px">Clear All</button>'+
    '<div class="cmp-table"><table>'+
    '<tr><th></th>'+items.map(function(p){
      return '<th class="cmp-head">'+renderImg(p,60,60)+'<div style="font-family:Syne,sans-serif;font-size:11px;font-weight:700;color:var(--txt);background:transparent;margin-top:4px">'+p.name+'</div></th>';
    }).join('')+'</tr>';

  // Price rows
  var bps=items.map(function(p){return bp(p);});
  var minBp=Math.min.apply(null,bps);
  html+='<tr><td class="slb" style="font-weight:600;color:var(--txt2)">Best Price</td>'+items.map(function(p){return '<td class="'+(bp(p)===minBp?'best':'')+'">'+fmt(bp(p))+'</td>';}).join('')+'</tr>';
  html+='<tr><td class="slb" style="color:var(--txt3)">Amazon</td>'+items.map(function(p){return '<td>'+fmt(p.ap)+'</td>';}).join('')+'</tr>';
  html+='<tr><td class="slb" style="color:var(--txt3)">Flipkart</td>'+items.map(function(p){return '<td>'+fmt(p.fp)+'</td>';}).join('')+'</tr>';
  html+='<tr><td class="slb" style="color:var(--txt3)">Discount</td>'+items.map(function(p){return '<td style="color:var(--grn)">'+dc(bm(p),bp(p))+'% off</td>';}).join('')+'</tr>';
  html+='<tr><td class="slb" style="color:var(--txt3)">Rating</td>'+items.map(function(p){return '<td>★ '+p.r+' ('+p.rv.toLocaleString()+')</td>';}).join('')+'</tr>';

  // Spec rows
  allKeys.filter(function(k){return['Best Price','MRP','Amazon Price','Flipkart Price','Discount'].indexOf(k)<0;}).forEach(function(key){
    var vals=items.map(function(p){
      var v='—';
      Object.keys(p.specs).forEach(function(cat){if(p.specs[cat][key])v=p.specs[cat][key];});
      return v;
    });
    if(vals.some(function(v){return v!=='—';})){
      html+='<tr><td class="slb" style="color:var(--txt3)">'+key+'</td>'+vals.map(function(v){return '<td>'+v+'</td>';}).join('')+'</tr>';
    }
  });
  html+='</table></div></div>';
  return html;
}

function renderPred(){
  var today=new Date();
  var evs=SALES.map(function(e){return Object.assign({},e,{days:Math.ceil((new Date(e.start)-today)/864e5)});})
    .filter(function(e){return e.days>=0;}).sort(function(a,b){return a.days-b.days;});
  return '<p style="font-size:10px;color:var(--txt3);margin-bottom:12px;background:var(--surf);border-radius:8px;padding:8px 12px;border:1px solid var(--bord)">'+
    '⚠️ <strong>Disclaimer:</strong> Predictions are based on historical Indian e-commerce sale patterns from prior years. Actual dates, discounts and availability may differ. DealRadar does not guarantee any specific price or sale.</p>'+
    '<div class="pred-grid">'+evs.map(function(e){
      return '<div class="pred-card" style="border-left:3px solid '+e.color+'">'+
        '<div style="font-size:9px;font-weight:700;color:'+e.color+';text-transform:uppercase;margin-bottom:4px">'+(e.plat==='both'?'Amazon + Flipkart':e.plat)+'</div>'+
        '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:12px;margin-bottom:3px">'+e.name+'</div>'+
        '<div style="font-size:10px;color:var(--txt3)">&#128197; '+e.start+'</div>'+
        '<div style="font-size:9px;font-weight:600;margin-top:4px;color:'+(e.conf==='Very High'?'#10b981':e.conf==='High'?'#f59e0b':'#9898a8')+'">'+e.conf+' confidence &bull; avg '+e.disc+'% off</div>'+
        '<div style="font-size:10px;color:var(--txt3);margin-top:2px">'+(e.days===0?'Today!':e.days+' days away')+'</div>'+
        '</div>';
    }).join('')+'</div>'+
    '<div class="chart-panel"><div class="ctitle">Historical avg discount % by month (India e-commerce)</div>'+
    '<div style="position:relative;height:180px"><canvas id="pc"></canvas></div></div>'+
    '<div class="ctitle" style="margin-bottom:10px">Per-product predicted sale price</div>'+
    allP().map(function(p){
      var nb=bp(p);var ne=evs[0];
      var pred=ne?Math.round(nb*(1-ne.disc/100)/1000)*1000:null;
      return '<div class="ait" style="margin-bottom:8px">'+
        '<img src="'+p.img.url+'" style="width:30px;height:30px;object-fit:contain;border-radius:6px;background:#fff;flex-shrink:0" onerror="imgFb(this,'+p.id+')" alt="'+p.name+'"/>'+
        '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500">'+p.name+'</div>'+
        '<div style="font-size:10px;color:var(--txt3)">'+p.pr+'</div></div>'+
        '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:14px;color:var(--grn)">'+fmt(pred)+'</div></div>';
    }).join('');
}

    '<option value="gaming_entry">🎮 Entry Gaming (&lt;₹75k)</option>'+
    '<option value="gaming_mid">🎮 Mid Gaming (₹75k–1.3L)</option>'+
    '<option value="gaming_high">🎮 High-End / Intensive</option>'+
    '<option value="work">💼 Work Laptop</option>'+

    '<option value="phone">📱 Phone</option>'+
    '</select>'+

  if(S.anl.result){
    var res=S.anl.result;
    html+='<div class="anl-result">'+
      '<span class="tier-badge" style="background:'+res.color+'20;color:'+res.color+';border:1px solid '+res.color+'40">'+res.tier+'</span>'+
      (res.advice?'<p style="font-size:11px;color:var(--txt3);margin:7px 0">'+res.advice+'</p>':'')+
      (res.recs.length?'<div class="pgrid" style="margin-top:8px">'+res.recs.map(renderCard).join('')+'</div>':
      '<p style="color:var(--txt3);font-size:12px;margin-top:8px">No products found. Try a higher budget.</p>')+
      '</div>';
  }
  return html+'</div>';
}
function runAnalyzer(){
  var budget=parseFloat(document.getElementById('anlb').value);
  var useCase=document.getElementById('anlu').value;
  if(!budget){toast('Enter a budget first','err');return;}
  S.anl.budget=budget;S.anl.useCase=useCase;
  var recs=[],tier,col,advice='';
  if(useCase.startsWith('gaming')){
    var ranges={gaming_entry:[0,75000],gaming_mid:[50000,130000],gaming_high:[100000,9999999]};
    var r=ranges[useCase];
    recs=allP().filter(function(p){return p.cat==='gaming'&&bp(p)<=budget;})
      .filter(function(p){return bp(p)>=r[0]&&bp(p)<=r[1];})
      .sort(function(a,b){return bp(b)-bp(a);}).slice(0,6);
    if(!recs.length)recs=allP().filter(function(p){return p.cat==='gaming'&&bp(p)<=budget;}).sort(function(a,b){return bp(b)-bp(a);}).slice(0,6);
    tier=useCase==='gaming_entry'?'Entry Gaming':useCase==='gaming_mid'?'Mid-Range Gaming':'High-End Gaming';
    col=useCase==='gaming_entry'?'#10b981':useCase==='gaming_mid'?'#6366f1':'#f97316';
    advice=useCase==='gaming_entry'?'Handles esports titles (Valorant, CS2, BGMI). RTX 4050/4060 range. Prioritise refresh rate over resolution.':
      useCase==='gaming_mid'?'Plays AAA titles on High/Ultra, handles streaming/editing. RTX 4070 sweet spot.':
      'Maximum performance — VR, 4K gaming, 3D rendering. RTX 4080/4090. Pair with eGPU for future-proofing.';
  }else if(useCase==='work'||useCase==='work_premium'){
    recs=allP().filter(function(p){return p.cat==='laptop'&&bp(p)<=budget;}).sort(function(a,b){return bp(b)-bp(a);}).slice(0,6);
    tier=useCase==='work'?'Work Laptop':'Premium Work/Creator';
    col=useCase==='work'?'#3b82f6':'#8b5cf6';
    advice=useCase==='work'?'Lightweight with long battery. Ideal for Office, Zoom, coding. Prioritise portability and keyboard.':
      'OLED display + powerful CPU for video editing, design, developer workloads.';
  }else if(useCase==='phone'){
    recs=allP().filter(function(p){return p.cat==='phone'&&bp(p)<=budget;}).sort(function(a,b){return bp(b)-bp(a);}).slice(0,6);
    tier=budget<25000?'Budget Phone':budget<50000?'Mid-Range Phone':budget<80000?'Flagship Lite':'Premium Flagship';
    col=budget<25000?'#10b981':budget<50000?'#3b82f6':budget<80000?'#f59e0b':'#ef4444';
    advice='Best phones ranked by value within your budget.';
  }else{
    ['laptop','gaming','phone','tablet'].forEach(function(cat){allP().filter(function(p){return p.cat===cat&&bp(p)<=budget;}).sort(function(a,b){return bp(b)-bp(a);}).slice(0,2).forEach(function(p){recs.push(p);});});
    tier=budget<40000?'Entry':budget<80000?'Mid-Range':budget<130000?'Upper Mid':'Premium';
    col=budget<40000?'#10b981':budget<80000?'#3b82f6':budget<130000?'#f59e0b':'#ef4444';
    advice='Best picks across all categories within your budget.';
  }
  S.anl.result={tier:tier,color:col,recs:recs,advice:advice};
  render();
  setTimeout(function(){recs.forEach(initSpark);},100);
}

function reqNotif(){
  if(!('Notification' in window)){toast('Not supported in this browser','warn');return;}
  if(Notification.permission==='granted'){toast('Notifications already enabled ✓');return;}
  if(Notification.permission==='denied'){toast('Blocked — enable in browser settings','warn');return;}
  Notification.requestPermission().then(function(r){
    if(r==='granted'){document.getElementById('nbtn').classList.add('on');toast('Notifications enabled &#128276;');
      setTimeout(function(){new Notification('DealRadar Active!',{body:"You'll be alerted on price drops!"});},800);}
    else toast('Permission denied','warn');
  });
}
function countdown(){
  var d=Math.ceil((new Date('2026-10-05')-new Date())/864e5);
  var el=document.getElementById('dl');if(el)el.textContent=d>0?d+' days away':'Happening now!';
}

// ─────────────────────────────────────────────────────────────────────────────
// PWA SERVICE WORKER
// ─────────────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  var sw=['const C="dr-v4";',
    'self.addEventListener("install",e=>e.waitUntil(caches.open(C).then(c=>c.addAll(["/"]).catch(()=>{})).then(()=>self.skipWaiting())));',
    'self.addEventListener("activate",e=>e.waitUntil(self.clients.claim()));',
    'self.addEventListener("fetch",e=>{if(e.request.method!=="GET")return;',
    'e.respondWith(fetch(e.request).then(r=>{if(r&&r.ok){const c=r.clone();caches.open(C).then(cache=>cache.put(e.request,c));}return r;}).catch(()=>caches.match(e.request)));});'
  ].join('');
  try{var blob=new Blob([sw],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'./+'}).catch(function(){});}catch(e){}
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();window._ip=e;
    var tb=document.querySelector('.topbar');
    if(tb&&!document.getElementById('instbtn')){
      var b=document.createElement('button');b.id='instbtn';b.className='ibtn';b.title='Install app';
      b.innerHTML='<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 2v13m0 0-4-4m4 4 4-4"/><rect x="2" y="17" width="20" height="5" rx="2"/></svg>';
      b.onclick=function(){window._ip&&window._ip.prompt();};
      tb.insertBefore(b,document.getElementById('nbtn'));
    }
  });
  window.addEventListener('appinstalled',function(){toast('DealRadar installed! &#127881;');});
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
countdown();
// AdSense init (only for free users)
if(!PREM.active){
  try{(window.adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
}
render();
